<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grazie - Palio 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark: #1a1a1a;
            --white: #f4f4f4;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), 
                        url('Palio2026.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--white);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            background: rgba(0, 0, 0, 0.85);
            padding: 50px;
            border-radius: 20px;
            border: 2px solid var(--gold);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            max-width: 600px;
            margin: 20px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 5px #000;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            background: var(--gold);
            color: var(--dark);
            text-decoration: none;
            padding: 15px 30px;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover {
            background: #fff;
            transform: scale(1.05);
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🏆</div>
        <h1>Grazie per la tua richiesta!</h1>
        <p>
            Il tuo messaggio è stato consegnato al tuo capitano!<br>
            Verrai contattato/a al più presto per confermare la tua partecipazione.
        </p>
        <p style="font-style: italic; color: var(--gold);">Che vinca il migliore!</p>
        <a href="index.html" class="btn">Torna alla Home</a>
    </div>

</body>
</html>
