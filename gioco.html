<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palio 2026 - La Corsa dei Destrieri</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dirt: #8b5a2b; }
        body { background: #1a1a1a; color: white; font-family: 'Open Sans', sans-serif; text-align: center; padding: 10px; margin: 0; }
        h1 { font-family: 'Cinzel', serif; color: var(--gold); text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 10px; }
        
        .container { max-width: 850px; margin: 0 auto; background: #2c1e12; padding: 20px; border-radius: 15px; border: 3px solid var(--gold); box-shadow: 0 0 30px rgba(0,0,0,0.7); position: relative; }
        
        #wallet-display { font-size: 2.2rem; color: #4dff4d; font-weight: bold; margin-bottom: 15px; text-shadow: 2px 2px 0px #000; }
        
        .betting-panel { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; border: 1px solid var(--gold); margin-bottom: 20px; }
        select, input, button { padding: 12px; font-size: 1rem; border-radius: 5px; border: none; margin: 5px; background: #fff; color: #000; }
        
        #start-race-btn { background: var(--gold); color: black; font-weight: bold; cursor: pointer; width: 220px; transition: 0.3s; text-transform: uppercase; }
        #start-race-btn:hover { background: #fff; transform: scale(1.05); }
        #start-race-btn:disabled { background: #555; cursor: not-allowed; transform: none; }

        /* Pista */
        #race-track { 
            position: relative; 
            background: var(--dirt); 
            border: 6px solid #3e2723; 
            border-radius: 8px; 
            overflow: hidden; 
            display: none; 
            margin-top: 20px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
        }
        
        .finish-line { 
            position: absolute; 
            right: 80px; top: 0; bottom: 0; width: 20px; 
            background: repeating-linear-gradient(0deg, #fff, #fff 10px, #000 10px, #000 20px); 
            z-index: 10; border-left: 2px solid gold;
        }

        .lane { 
            position: relative; height: 75px; 
            border-bottom: 2px solid rgba(255,255,255,0.1); 
            display: flex; align-items: center; 
            background: rgba(0,0,0,0.1);
        }
        
        .horse-sprite { 
            position: absolute; left: 10px; font-size: 45px; z-index: 5;
            filter: drop-shadow(3px 5px 2px rgba(0,0,0,0.6));
            display: flex; flex-direction: column; align-items: center;
        }

        .horse-name { font-size: 11px; font-weight: bold; text-transform: uppercase; background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; margin-top: -8px; border: 1px solid rgba(255,255,255,0.2); }

        .btn-home { display: inline-block; margin-top: 25px; color: var(--gold); text-decoration: none; font-weight: bold; border: 1px solid var(--gold); padding: 12px 25px; border-radius: 8px; transition: 0.3s; }
        .btn-home:hover { background: var(--gold); color: black; }
        
        /* Messaggio di rotazione obbligatoria */
        #rotate-message {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #1a1a1a;
            color: var(--gold);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: 'Cinzel', serif;
        }

        @media screen and (orientation: portrait) {
            #rotate-message { display: flex; }
            .container, h1, .btn-home { display: none; }
        }

        /* --- NUOVI STILI OVERLAY FINALE --- */
        #end-race-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; border-radius: 8px; animation: fadeIn 0.5s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .cup-emoji, .sad-emoji { font-size: 6rem; margin-bottom: 10px; }
        .win-title { font-size: 2.5rem; color: #4dff4d; font-family: 'Cinzel'; text-shadow: 0 0 15px #4dff4d; margin: 0; }
        .lose-title { font-size: 2.5rem; color: #ff4d4d; font-family: 'Cinzel'; margin: 0; }
        .firework { position: absolute; width: 4px; height: 4px; border-radius: 50%; animation: explode 1s ease-out forwards; }
        @keyframes explode { 0% { transform: translate(0, 0); opacity: 1; } 100% { transform: translate(var(--x), var(--y)); opacity: 0; } }
    </style>
</head>
<body>
    <div id="rotate-message">
        <div style="font-size: 50px;">🔄</div>
        <h2>RUOTA IL DISPOSITIVO</h2>
        <p>Il Torneo dei Destrieri richiede la visuale panoramica per una corsa epica!</p>
    </div>

    <h1>🏇 GRAN TORNEO DEI DESTRIERI</h1>
    
    <div class="container">
        <div id="wallet-display">💰 <span id="credits">5</span> MONETE</div>

        <div class="betting-panel">
            <p style="margin-top:0">Analizza l'energia e punta (Max 5):</p>
            <select id="horse-select"></select>
            <input type="number" id="bet-amount" min="1" max="5" value="1">
            <button id="start-race-btn" onclick="startRace()">INIZIA LA CORSA</button>
        </div>

        <div id="race-track">
            <div id="end-race-overlay"></div>
            <div class="finish-line"></div>
            <div id="lanes-container"></div>
        </div>

        <div id="race-result" style="margin-top: 20px; font-size: 1.6rem; font-family: 'Cinzel'; min-height: 80px; line-height: 1.2;"></div>
    </div>

    <a href="index.html" class="btn-home">⬅️ RITORNA ALLA HOME</a>

    <script>
        let totalCredits = 5;
        let horses = [
            { id: 1, name: "Furia Rossa", color: "#ff4d4d", energy: 0 },
            { id: 2, name: "Onda Blu", color: "#4d94ff", energy: 0 },
            { id: 3, name: "Smeraldo", color: "#4dff4d", energy: 0 },
            { id: 4, name: "Fulmine", color: "#ffff4d", energy: 0 }
        ];

        refreshEnergies();

        function refreshEnergies() {
            const select = document.getElementById('horse-select');
            select.innerHTML = "";
            horses.forEach(h => {
                h.energy = Math.floor(Math.random() * (95 - 30 + 1)) + 30;
                let opt = document.createElement('option');
                opt.value = h.id;
                let mood = h.energy > 80 ? "🔥" : h.energy > 50 ? "⚡" : "💤";
                opt.innerHTML = `${mood} ${h.name} (Energia: ${h.energy}%)`;
                select.appendChild(opt);
            });
        }

        // Funzione per i fuochi d'artificio
        function createFirework() {
            const track = document.getElementById('race-track');
            const colors = ['#ff4d4d', '#4d94ff', '#4dff4d', '#ffff4d', '#d4af37'];
            const originX = track.clientWidth * 0.5 + (Math.random() * track.clientWidth * 0.3);
            const originY = track.clientHeight * 0.4;

            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'firework';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.left = originX + 'px';
                p.style.top = originY + 'px';
                p.style.setProperty('--x', (Math.random() - 0.5) * 400 + 'px');
                p.style.setProperty('--y', (Math.random() - 0.5) * 400 + 'px');
                track.appendChild(p);
                setTimeout(() => p.remove(), 1000);
            }
        }

        function startRace() {
            const betAmount = parseInt(document.getElementById('bet-amount').value);
            const selectedHorseId = parseInt(document.getElementById('horse-select').value);
            const track = document.getElementById('race-track');
            const resultDiv = document.getElementById('race-result');
            const btn = document.getElementById('start-race-btn');
            const overlay = document.getElementById('end-race-overlay');

            if (betAmount > totalCredits || betAmount < 1 || betAmount > 5) {
                alert("Puntata non valida!");
                return;
            }

            overlay.style.display = 'none';
            totalCredits -= betAmount;
            document.getElementById('credits').innerHTML = totalCredits;
            resultDiv.innerHTML = "I cancelli si spalancano... PARTITI!";
            resultDiv.style.color = "white";
            track.style.display = 'block';
            btn.disabled = true;

            const container = document.getElementById('lanes-container');
            container.innerHTML = "";
            const horseStates = horses.map(h => ({ ...h, pos: 15 }));

            horseStates.forEach(h => {
                const lane = document.createElement('div');
                lane.className = "lane";
                lane.innerHTML = `
                    <div id="h-${h.id}" class="horse-sprite">
                        🏇
                        <span class="horse-name" style="color:${h.color}; border-color:${h.color}">${h.name}</span>
                    </div>
                `;
                container.appendChild(lane);
            });

            const raceInterval = setInterval(() => {
                let winnerFound = null;

                horseStates.forEach(h => {
                    let boost = 1; 
                    if (h.energy < 60) {
                        boost *= 0.8; 
                    } 
                    h.pos += (Math.random() * boost) + (Math.random() * 3);
                    
                    const el = document.getElementById(`h-${h.id}`);
                    el.style.left = h.pos + "px";

                    if (h.pos >= track.clientWidth - 95) {
                        if (!winnerFound) winnerFound = h;
                    }
                });

                if (winnerFound) {
                    clearInterval(raceInterval);
                    const won = winnerFound.id === selectedHorseId;
                    
                    // Mostra Overlay
                    overlay.style.display = 'flex';
                    if(won) {
                        totalCredits += (betAmount * 2);
                        overlay.innerHTML = `<div class="cup-emoji">🏆</div><h2 class="win-title">VITTORIA!</h2><p style="color:var(--gold)">${winnerFound.name} ti ha fatto raddoppiare!</p>`;
                        resultDiv.innerHTML = `<span style="color:var(--gold)">VITTORIA EPICA!</span>`;
                        for(let i=0; i<3; i++) setTimeout(createFirework, i*300);
                    } else {
                        overlay.innerHTML = `<div class="sad-emoji">😭</div><h2 class="lose-title">SCONFITTA</h2><p style="color:#aaa">${winnerFound.name} ha vinto la gara.</p>`;
                        resultDiv.innerHTML = `<span style="color:#ff4d4d">SCONFITTA!</span>`;
                    }
                    
                    document.getElementById('credits').innerHTML = totalCredits;
                    
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        if(totalCredits <= 0) {
                            resultDiv.innerHTML += "<br><small style='color:#777'>MONETE ESAURITE. RICARICA LA PAGINA!</small>";
                        } else {
                            btn.disabled = false;
                            refreshEnergies();
                        }
                    }, 4000); // L'overlay sparisce dopo 4 secondi per permettere una nuova giocata
                }
            }, 50);
        }
    </script>
</body>
</html>
