<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palio 2026 - La Corsa dei Destrieri</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dirt: #8b5a2b; }
        body { background: #1a1a1a; color: white; font-family: 'Open Sans', sans-serif; text-align: center; padding: 10px; margin: 0; }
        h1 { font-family: 'Cinzel', serif; color: var(--gold); text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 10px; }
        
        .container { max-width: 850px; margin: 0 auto; background: #2c1e12; padding: 20px; border-radius: 15px; border: 3px solid var(--gold); box-shadow: 0 0 30px rgba(0,0,0,0.7); }
        
        #wallet-display { font-size: 2.2rem; color: #4dff4d; font-weight: bold; margin-bottom: 15px; text-shadow: 2px 2px 0px #000; }
        
        .betting-panel { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; border: 1px solid var(--gold); margin-bottom: 20px; }
        select, input, button { padding: 12px; font-size: 1rem; border-radius: 5px; border: none; margin: 5px; background: #fff; color: #000; }
        
        #start-race-btn { background: var(--gold); color: black; font-weight: bold; cursor: pointer; width: 220px; transition: 0.3s; text-transform: uppercase; }
        #start-race-btn:hover { background: #fff; transform: scale(1.05); }
        #start-race-btn:disabled { background: #555; cursor: not-allowed; transform: none; }

        /* Pista */
        #race-track { 
            position: relative; 
            background: var(--dirt); 
            border: 6px solid #3e2723; 
            border-radius: 8px; 
            overflow: hidden; 
            display: none; 
            margin-top: 20px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
        }
        
        .finish-line { 
            position: absolute; 
            right: 80px; top: 0; bottom: 0; width: 20px; 
            background: repeating-linear-gradient(0deg, #fff, #fff 10px, #000 10px, #000 20px); 
            z-index: 10; border-left: 2px solid gold;
        }

        .lane { 
            position: relative; height: 75px; 
            border-bottom: 2px solid rgba(255,255,255,0.1); 
            display: flex; align-items: center; 
            background: rgba(0,0,0,0.1);
        }
        
        .horse-sprite { 
            position: absolute; left: 10px; font-size: 45px; z-index: 5;
            filter: drop-shadow(3px 5px 2px rgba(0,0,0,0.6));
            display: flex; flex-direction: column; align-items: center;
        }

        .horse-name { font-size: 11px; font-weight: bold; text-transform: uppercase; background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; margin-top: -8px; border: 1px solid rgba(255,255,255,0.2); }

        .btn-home { display: inline-block; margin-top: 25px; color: var(--gold); text-decoration: none; font-weight: bold; border: 1px solid var(--gold); padding: 12px 25px; border-radius: 8px; transition: 0.3s; }
        .btn-home:hover { background: var(--gold); color: black; }
    </style>
</head>
<body>

    <h1>🏇 GRAN TORNEO DEI DESTRIERI</h1>
    
    <div class="container">
        <div id="wallet-display">💰 <span id="credits">5</span> MONETE</div>

        <div class="betting-panel">
            <p style="margin-top:0">Analizza l'energia e punta (Max 5):</p>
            <select id="horse-select"></select>
            <input type="number" id="bet-amount" min="1" max="5" value="1">
            <button id="start-race-btn" onclick="startRace()">INIZIA LA CORSA</button>
        </div>

        <div id="race-track">
            <div class="finish-line"></div>
            <div id="lanes-container"></div>
        </div>

        <div id="race-result" style="margin-top: 20px; font-size: 1.6rem; font-family: 'Cinzel'; min-height: 80px; line-height: 1.2;"></div>
    </div>

    <a href="index.html" class="btn-home">⬅️ RITORNA ALLA HOME</a>

    <script>
        let totalCredits = 5;
        let horses = [
            { id: 1, name: "Furia Rossa", color: "#ff4d4d", energy: 0 },
            { id: 2, name: "Levriero Blu", color: "#4d94ff", energy: 0 },
            { id: 3, name: "Smeraldo", color: "#4dff4d", energy: 0 },
            { id: 4, name: "Fulmine Giallo", color: "#ffff4d", energy: 0 }
        ];

        // Inizializza il gioco
        refreshEnergies();

        function refreshEnergies() {
            const select = document.getElementById('horse-select');
            select.innerHTML = "";
            
            horses.forEach(h => {
                // Energia casuale tra 30 e 95 per ogni partita
                h.energy = Math.floor(Math.random() * (95 - 30 + 1)) + 30;
                
                let opt = document.createElement('option');
                opt.value = h.id;
                // Emoji per indicare visivamente la forza
                let mood = h.energy > 80 ? "🔥" : h.energy > 50 ? "⚡" : "💤";
                opt.innerHTML = `${mood} ${h.name} (Energia: ${h.energy}%)`;
                select.appendChild(opt);
            });
        }

        function startRace() {
            const betAmount = parseInt(document.getElementById('bet-amount').value);
            const selectedHorseId = parseInt(document.getElementById('horse-select').value);
            const track = document.getElementById('race-track');
            const resultDiv = document.getElementById('race-result');
            const btn = document.getElementById('start-race-btn');

            if (betAmount > totalCredits || betAmount < 1 || betAmount > 5) {
                alert("Puntata non valida!");
                return;
            }

            totalCredits -= betAmount;
            document.getElementById('credits').innerHTML = totalCredits;
            resultDiv.innerHTML = "I cancelli si spalancano... PARTITI!";
            resultDiv.style.color = "white";
            track.style.display = 'block';
            btn.disabled = true;

            const container = document.getElementById('lanes-container');
            container.innerHTML = "";
            const horseStates = horses.map(h => ({ ...h, pos: 15 }));

            horseStates.forEach(h => {
                const lane = document.createElement('div');
                lane.className = "lane";
                lane.innerHTML = `
                    <div id="h-${h.id}" class="horse-sprite">
                        🏇
                        <span class="horse-name" style="color:${h.color}; border-color:${h.color}">${h.name}</span>
                    </div>
                `;
                container.appendChild(lane);
            });

            const raceInterval = setInterval(() => {
                let winnerFound = null;

                horseStates.forEach(h => {
                    // Funzione che "schiaccia" i valori alti e penalizza i bassi
		    let boost = Math.sqrt(h.energy) * 1.2; 

		    // Aggiungiamo un piccolo "malus" extra se l'energia è sotto il 50%
		    if (h.energy < 50) {
		        boost *= 0.8; 
		    } 
		    h.pos += (Math.random() * boost) + (Math.random() * 4);
                    
                    const el = document.getElementById(`h-${h.id}`);
                    el.style.left = h.pos + "px";

                    if (h.pos >= track.clientWidth - 95) {
                        if (!winnerFound) winnerFound = h;
                    }
                });

                if (winnerFound) {
                    clearInterval(raceInterval);
                    const won = winnerFound.id === selectedHorseId;
                    
                    if(won) {
                        totalCredits += (betAmount * 2);
                        resultDiv.innerHTML = `<span style="color:var(--gold)">VITTORIA EPICA!</span><br>${winnerFound.name} ti ha fatto raddoppiare!`;
                    } else {
                        resultDiv.innerHTML = `<span style="color:#ff4d4d">SCONFITTA!</span><br>${winnerFound.name} ha vinto la gara.`;
                    }
                    
                    document.getElementById('credits').innerHTML = totalCredits;
                    
                    if(totalCredits <= 0) {
                        resultDiv.innerHTML += "<br><small style='color:#777'>MONETE ESAURITE. RICARICA LA PAGINA!</small>";
                    } else {
                        btn.disabled = false;
                        // Rimescola le energie per la prossima gara
                        refreshEnergies();
                    }
                }
            }, 50);
        }
    </script>
</body>
</html>
