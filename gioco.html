<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gran Torneo dei Destrieri - Palio 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #1a1a1a; }
        body { background: #000; color: white; font-family: 'Open Sans', sans-serif; text-align: center; padding: 20px; }
        h1, h2 { font-family: 'Cinzel', serif; color: var(--gold); }
        
        .container { max-width: 900px; margin: 0 auto; background: #2c1e12; padding: 20px; border-radius: 20px; border: 3px solid var(--gold); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        
        #wallet-display { font-size: 1.8rem; color: #4dff4d; margin: 15px 0; text-shadow: 2px 2px 5px black; }
        
        .betting-panel { background: rgba(0,0,0,0.6); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #5d4037; }
        select, input, button { padding: 12px; font-size: 1rem; border-radius: 8px; border: none; outline: none; margin: 5px; }
        
        #start-race-btn { background: var(--gold); color: black; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #start-race-btn:disabled { background: #555; cursor: not-allowed; }
        
        #race-track { position: relative; background: #5d4037; border: 5px solid #3e2723; border-radius: 10px; overflow: hidden; display: none; margin-top: 20px; }
        .finish-line { position: absolute; right: 60px; top: 0; bottom: 0; width: 10px; background: repeating-linear-gradient(0deg, #fff, #fff 10px, #000 10px, #000 20px); z-index: 1; }
        
        .lane { position: relative; height: 55px; border-bottom: 2px solid #4e342e; display: flex; align-items: center; }
        .horse-sprite { position: absolute; left: 0; font-size: 30px; transition: left 0.1s linear; white-space: nowrap; filter: drop-shadow(2px 2px 2px black); }
        .horse-name { font-size: 10px; display: block; text-transform: uppercase; font-weight: bold; }

        .btn-home { display: inline-block; margin-top: 30px; color: var(--gold); text-decoration: none; font-weight: bold; border: 1px solid var(--gold); padding: 10px 20px; border-radius: 5px; transition: 0.3s; }
        .btn-home:hover { background: var(--gold); color: black; }
    </style>
</head>
<body>

    <h1>🐎 IL TORNEO DEI DESTRIERI</h1>
    
    <div class="container">
        <div id="wallet-display">💰 CREDITI: <span id="credits">5</span></div>

        <div class="betting-panel">
            <p>Scegli il tuo campione e punta (1-5 monete):</p>
            <select id="horse-select"></select>
            <input type="number" id="bet-amount" min="1" max="5" value="1">
            <button id="start-race-btn" onclick="startRace()">COMINCIA LA GARA</button>
        </div>

        <div id="race-track">
            <div class="finish-line"></div>
            <div id="lanes-container"></div>
        </div>

        <div id="race-result" style="margin-top: 25px; font-size: 1.8rem; font-family: 'Cinzel'; min-height: 50px;"></div>
    </div>

    <a href="index.html" class="btn-home">⬅️ RITORNA ALLA HOME DEL PALIO</a>

    <script>
        let totalCredits = 5;
        const horses = [
            { id: 1, name: "Furia Rossa", color: "#ff4d4d", stars: 5 },
            { id: 2, name: "Rubino", color: "#ff4d4d", stars: 3 },
            { id: 3, name: "Levriero Blu", color: "#4d94ff", stars: 4 },
            { id: 4, name: "Abisso", color: "#4d94ff", stars: 2 },
            { id: 5, name: "Smeraldo", color: "#4dff4d", stars: 5 },
            { id: 6, name: "Bosco Vivo", color: "#4dff4d", stars: 1 },
            { id: 7, name: "Fulmine Giallo", color: "#ffff4d", stars: 4 },
            { id: 8, name: "Pepita d'Oro", color: "#ffff4d", stars: 3 }
        ];

        const select = document.getElementById('horse-select');
        horses.forEach(h => {
            let opt = document.createElement('option');
            opt.value = h.id;
            opt.innerHTML = `${h.name} (${'⭐'.repeat(h.stars)})`;
            select.appendChild(opt);
        });

        function startRace() {
            const betAmount = parseInt(document.getElementById('bet-amount').value);
            const selectedHorseId = parseInt(select.value);
            const track = document.getElementById('race-track');
            const resultDiv = document.getElementById('race-result');

            if (betAmount > totalCredits || betAmount < 1 || betAmount > 5) {
                alert("Puntata non valida! (Max 5 crediti)");
                return;
            }

            totalCredits -= betAmount;
            document.getElementById('credits').innerHTML = totalCredits;
            resultDiv.innerHTML = "I cancelli si aprono...";
            track.style.display = 'block';
            document.getElementById('start-race-btn').disabled = true;

            const container = document.getElementById('lanes-container');
            container.innerHTML = "";
            const horseStates = horses.map(h => ({ ...h, pos: 0 }));

            horseStates.forEach(h => {
                const lane = document.createElement('div');
                lane.className = "lane";
                lane.innerHTML = `<div id="h-${h.id}" class="horse-sprite">🏇<span class="horse-name" style="color:${h.color}">${h.name}</span></div>`;
                container.appendChild(lane);
            });

            const raceInterval = setInterval(() => {
                let winner = null;
                horseStates.forEach(h => {
                    h.pos += Math.random() * (h.stars * 1.5) + (Math.random() * 6);
                    const el = document.getElementById(`h-${h.id}`);
                    el.style.left = h.pos + "px";
                    if (h.pos >= track.clientWidth - 90 && !winner) winner = h;
                });

                if (winner) {
                    clearInterval(raceInterval);
                    const won = winner.id === selectedHorseId;
                    if(won) totalCredits += (betAmount * 2);
                    
                    document.getElementById('credits').innerHTML = totalCredits;
                    resultDiv.innerHTML = won ? `🏆 TRIONFO! ${winner.name} vince!` : `💀 SCONFITTA! Ha vinto ${winner.name}`;
                    resultDiv.style.color = won ? "#4dff4d" : "#ff4d4d";
                    document.getElementById('start-race-btn').disabled = totalCredits <= 0;
                    if(totalCredits <= 0) resultDiv.innerHTML += "<br><small>CREDITI ESAURITI. RICARICA LA PAGINA!</small>";
                }
            }, 80).getTime();
        }
    </script>
</body>
</html>
